<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Exploradores de Yucatán - Colegio Miraflores</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #0a2e10; }

    /* ===== PANTALLA PRINCIPAL ===== */
    #pantalla-inicio {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0a2e10 0%, #1a4a1a 50%, #0d3010 100%);
      display: flex; flex-direction: column;
      align-items: center; z-index: 100;
      overflow: hidden;
    }

    #pantalla-inicio svg.fondo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .header {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 18px 18px 8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      width: 100%;
    }
    .header img {
      width: 50px; height: 50px;
      object-fit: contain; margin-bottom: 4px;
    }
    .header .nombre {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: #b9f6ca;
    }
    .header .lema {
      font-size: 11px; font-weight: 700;
      font-style: italic; color: #81c784;
    }
    .header h1 {
      font-size: 14px; font-weight: 900;
      color: white; margin-top: 3px;
    }

    /* Grid del menú */
    .menu-grid {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 10px 14px;
      width: 100%; max-width: 420px;
      margin-top: 6px;
    }
    .menu-btn {
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(105,240,174,0.35);
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.1s;
    }
    .menu-btn:active {
      transform: scale(0.95);
      background: rgba(0,0,0,0.75);
    }
    .menu-btn .emoji { font-size: 28px; margin-bottom: 4px; }
    .menu-btn .etiqueta {
      font-size: 13px; font-weight: 800; color: white;
    }

    /* ===== PANTALLA DE INFOGRAFÍA ===== */
    #pantalla-info {
      display: none;
      position: fixed; inset: 0;
      background: transparent;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #pantalla-info.activa { display: flex; }

    #img-infografia {
      width: 80%;
      max-height: 60vh;
      object-fit: contain;
      display: block;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      pointer-events: all;
    }

    #btn-volver {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #b9f6ca;
      border: 1px solid rgba(105,240,174,0.4);
      border-radius: 30px;
      padding: 12px 32px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; z-index: 300;
      backdrop-filter: blur(6px);
      pointer-events: all;
      white-space: nowrap;
    }
  </style>
</head>

  <!-- Header -->
  <div class="header">
    <img src="logo.jpg" alt="Colegio Miraflores" />
    <div class="nombre">Colegio Miraflores</div>
    <div class="lema">"México de mis amores"</div>
    <h1>¡Bienvenidos al sureste mexicano!</h1>
  </div>

  <!-- Menú de infografías -->
  <div class="menu-grid">
    <div class="menu-btn" onclick="abrirInfo('artistico.jpg')">
      <div class="emoji">🎨</div>
      <div class="etiqueta">Artístico</div>
    </div>
    <div class="menu-btn" onclick="abrirInfo('cultural.jpg')">
      <div class="emoji">🗺️</div>
      <div class="etiqueta">Cultural</div>
    </div>
    <div class="menu-btn" onclick="abrirInfo('historico.jpg')">
      <div class="emoji">🛕</div>

    </div>
    <div class="menu-btn" onclick="abrirInfo('social.jpg')">

    <div class="menu-btn" onclick="abrirInfo('gastronomico.png')">

    <div class="menu-btn" onclick="abrirInfo('turistico.jpg')">

</div>

<!-- ===== PANTALLA INFOGRAFÍA ===== -->
<div id="pantalla-info">
  <img id="img-infografia" src="" alt="Infografía" />
  <button id="btn-volver" onclick="volverMenu()">← Volver</button>
</div>

<script>
  function abrirInfo(archivo) {
    document.getElementById('img-infografia').src = archivo;
    document.getElementById('pantalla-info').classList.add('activa');
  }

  function volverMenu() {
    document.getElementById('pantalla-info').classList.remove('activa');
    document.getElementById('img-infografia').src = '';
  }
</script>

</body>
</html>
