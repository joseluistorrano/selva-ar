<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Exploradores de Yucatán - Colegio Miraflores</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #0a2e10; }

    #pantalla-inicio {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0a2e10 0%, #1a4a1a 50%, #0d3010 100%);
      display: flex; flex-direction: column;
      align-items: center; z-index: 100; overflow: hidden;
    }
    #pantalla-inicio svg.fondo {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .header {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 18px 18px 8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      width: 100%;
    }
    .header img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 4px; }
    .header .nombre { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #b9f6ca; }
    .header .lema { font-size: 11px; font-weight: 700; font-style: italic; color: #81c784; }
    .header h1 { font-size: 14px; font-weight: 900; color: white; margin-top: 3px; }
    .menu-grid {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 10px 14px;
      width: 100%; max-width: 420px; margin-top: 6px;
    }
    .menu-btn {
      background: rgba(0,0,0,0.58); backdrop-filter: blur(8px);
      border: 1px solid rgba(105,240,174,0.35);
      border-radius: 16px; padding: 14px 8px;
      text-align: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .menu-btn:active { transform: scale(0.95); }
    .menu-btn .emoji { font-size: 28px; margin-bottom: 4px; }
    .menu-btn .etiqueta { font-size: 13px; font-weight: 800; color: white; }

    #escena-ar { display: none; }

    #btn-volver {
      display: none;
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,46,16,0.88); color: #b9f6ca;
      border: 1px solid rgba(105,240,174,0.5);
      border-radius: 30px; padding: 14px 40px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; z-index: 999;
      white-space: nowrap; backdrop-filter: blur(6px);
    }
    #instruccion {
      display: none;
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #b9f6ca;
      border: 1px solid rgba(105,240,174,0.4);
      border-radius: 30px; padding: 10px 22px;
      font-size: 13px; font-weight: 700;
      z-index: 999; white-space: nowrap;
    }
  </style>
</head>
<body>

  </svg>

  <div class="header">
    <img src="logo.jpg" alt="Colegio Miraflores" />
    <div class="nombre">Colegio Miraflores</div>
    <div class="lema">"México de mis amores"</div>
    <h1>¡Bienvenidos al sureste mexicano!</h1>
  </div>

  <div class="menu-grid">
    <div class="menu-btn" onclick="abrirAR('artistico.jpg')">
      <div class="emoji">🎨</div><div class="etiqueta">Artístico</div>
    </div>
    <div class="menu-btn" onclick="abrirAR('cultural.jpg')">
      <div class="emoji">🗺️</div><div class="etiqueta">Cultural</div>
    </div>
    <div class="menu-btn" onclick="abrirAR('historico.jpg')">
      <div class="emoji">🛕</div><div class="etiqueta">Histórico</div>
    </div>
    <div class="menu-btn" onclick="abrirAR('social.jpg')">
      <div class="emoji">👘</div><div class="etiqueta">Social</div>
    </div>
    <div class="menu-btn" onclick="abrirAR('gastronomico.png')">
      <div class="emoji">🍖</div><div class="etiqueta">Gastronómico</div>
    </div>
    <div class="menu-btn" onclick="abrirAR('turistico.jpg')">
      <div class="emoji">🏊</div><div class="etiqueta">Turístico</div>
    </div>
  </div>
</div>

<a-scene
  id="escena-ar"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false"
>
  <a-assets>
    <img id="infografia-tex" src="" crossorigin="anonymous" />
  </a-assets>

  <!-- Infografía fija en el mundo, sin marcador -->
  <a-entity id="marcador">
    <a-image
      id="plano-info"
      src="#infografia-tex"
      width="2.5"
      height="1.8"
      position="0 0 -3"
      rotation="0 0 0"
      visible="false"
    ></a-image>
  </a-entity>

  <a-entity camera></a-entity>
</a-scene>

<button id="btn-volver" onclick="volverMenu()">← Volver al menú</button>
<div id="instruccion">🌿 Cargando...</div>

<script>


  function abrirAR(archivo) {
    document.getElementById('pantalla-inicio').style.display = 'none';

    // Cargar textura
    var tex = document.getElementById('infografia-tex');
    tex.src = archivo;
    document.getElementById('plano-info').setAttribute('src', '#infografia-tex');
    document.getElementById('plano-info').setAttribute('visible', 'false');

    document.getElementById('escena-ar').style.display = 'block';
    document.getElementById('btn-volver').style.display = 'block';
    document.getElementById('instruccion').style.display = 'block';

    // Mostrar infografía directamente frente a la cámara
    setTimeout(function() {
      document.getElementById('plano-info').setAttribute('visible', 'true');
      document.getElementById('instruccion').textContent = '✨ Mueve la cámara para explorar';
    }, 800);
  }

  function volverMenu() {
    document.getElementById('escena-ar').style.display = 'none';
    document.getElementById('btn-volver').style.display = 'none';
    document.getElementById('instruccion').style.display = 'none';
    document.getElementById('infografia-tex').src = '';
    document.getElementById('plano-info').setAttribute('visible', 'false');
    document.getElementById('pantalla-inicio').style.display = 'flex';
  }
</script>

</body>
</html>
